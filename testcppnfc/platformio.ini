; PlatformIO Project Configuration File
;
; Funtoria - Enterprise NFC Payment System
; Senior C++ Embedded Architecture
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200

; C++17 Standard for Modern C++ Features
build_flags = 
    -std=gnu++17
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -D CORE_DEBUG_LEVEL=3
    ; === LVGL Konfigürasyonu ===
    -I .
    -D LV_CONF_PATH=\"lv_conf.h\"
    -D LV_CONF_INCLUDE_SIMPLE
    ; === TFT_eSPI Konfigürasyonu (ILI9341 SPI) ===
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=23
    -D TFT_MISO=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=25
    -D TFT_RST=33
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=10000000
    -D SPI_READ_FREQUENCY=6000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1

build_unflags = 
    -std=gnu++11

; Library Dependencies - tum kutuphaneler lib/ klasorunde (local)
; Adafruit PN532, Adafruit BusIO, ArduinoJson, lvgl v9.4.0, TFT_eSPI v2.5.43
; lib_deps kullanilmiyor, kutuphaneler lib/ altinda yonetiliyor

; Upload settings
upload_speed = 921600

; Partition scheme for larger applications
board_build.partitions = huge_app.csv
